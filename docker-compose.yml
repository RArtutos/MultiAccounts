version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"  # Backend API port
      - "4173:4173"  # Frontend Vite port
    volumes:
      - ./data:/app/data
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=production
      - JWT_SECRET=your-secret-key-change-in-production
      - HOST=0.0.0.0
    networks:
      - app_network
    command: npm run dev
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - app_network
    restart: unless-stopped

networks:
  app_network:
    driver: bridge

volumes:
  data: